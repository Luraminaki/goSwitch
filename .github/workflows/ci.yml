name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# actions/setup-go@v6 sets GOTOOLCHAIN=local whenever go-version is given explicitly
# (as it is below), to stop Go's own toolchain auto-switching from silently overriding
# the version setup-go just installed. That's exactly backwards for us: go.mod's
# `toolchain go1.26.5` line only matters if auto-switching is allowed to act on it, and
# setup-go's cataloged "latest 1.26.x" can otherwise lag behind (it did: it installed
# 1.26.4, missing the crypto/tls fix in 1.26.5 that GO-2026-5856 needs -- CI failed
# govulncheck on exactly that gap). GOTOOLCHAIN=auto here restores go.mod as the actual
# source of truth for the exact patch version, which is also what already happens in
# every local dev environment.
env:
  GOTOOLCHAIN: auto

jobs:
  test:
    name: Build, vet, format, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # go-version (a minor-only constraint), not go-version-file: go.mod's own `go`
      # line is a fully-qualified patch version (e.g. 1.26.0) -- Go 1.21+'s tooling
      # rewrites it to that 3-part form on every `go mod tidy` regardless of what's
      # committed, and go-version-file would then pin CI to that exact patch forever
      # instead of floating to the latest 1.26.x. This is the same class of drift that
      # already caused a real CI-vs-local Go-version bug in this repo (see CHANGELOG).
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Check gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt'd:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Verify module integrity
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -timeout 120s

      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # go-version (a minor-only constraint), not go-version-file: go.mod's own `go`
      # line is a fully-qualified patch version (e.g. 1.26.0) -- Go 1.21+'s tooling
      # rewrites it to that 3-part form on every `go mod tidy` regardless of what's
      # committed, and go-version-file would then pin CI to that exact patch forever
      # instead of floating to the latest 1.26.x. This is the same class of drift that
      # already caused a real CI-vs-local Go-version bug in this repo (see CHANGELOG).
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # Pinned rather than "latest": golangci-lint v2 is a breaking config-format change
      # from v1 (see .golangci.yml's `version: "2"`), so an unpinned jump to a future v3
      # would silently break this the same way v1 -> v2 just did.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
