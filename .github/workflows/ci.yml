name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build, vet, format, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # go-version (a minor-only constraint), not go-version-file: go.mod's own `go`
      # line is a fully-qualified patch version (e.g. 1.26.0) -- Go 1.21+'s tooling
      # rewrites it to that 3-part form on every `go mod tidy` regardless of what's
      # committed, and go-version-file would then pin CI to that exact patch forever
      # instead of floating to the latest 1.26.x. This is the same class of drift that
      # already caused a real CI-vs-local Go-version bug in this repo (see CHANGELOG).
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      # setup-go writes GOTOOLCHAIN=local into $GITHUB_ENV as part of the step above
      # (to stop Go's own toolchain auto-switching from "fighting" the version it just
      # installed), which persists to every later step and silently overrides go.mod's
      # `toolchain go1.26.5` line -- a plain job/workflow-level `env:` can't win against
      # this, since GITHUB_ENV writes from an earlier step take precedence over those.
      # setup-go had only 1.26.4 cataloged, missing the crypto/tls fix 1.26.5 has for
      # GO-2026-5856, so govulncheck correctly failed against the unpatched stdlib this
      # produced. Re-exporting GOTOOLCHAIN=auto here, after setup-go's own write, lets
      # go.mod's toolchain line be the real source of truth again, matching every local
      # dev environment.
      - name: Allow go.mod's toolchain directive to upgrade the patch version
        run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

      - name: Check gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt'd:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Verify module integrity
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -timeout 120s

      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # go-version (a minor-only constraint), not go-version-file: go.mod's own `go`
      # line is a fully-qualified patch version (e.g. 1.26.0) -- Go 1.21+'s tooling
      # rewrites it to that 3-part form on every `go mod tidy` regardless of what's
      # committed, and go-version-file would then pin CI to that exact patch forever
      # instead of floating to the latest 1.26.x. This is the same class of drift that
      # already caused a real CI-vs-local Go-version bug in this repo (see CHANGELOG).
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      # See the identical step in the test job above: setup-go pins GOTOOLCHAIN=local,
      # which would otherwise leave golangci-lint's own build/analysis on whatever patch
      # setup-go had cataloged instead of go.mod's `toolchain go1.26.5`.
      - name: Allow go.mod's toolchain directive to upgrade the patch version
        run: echo "GOTOOLCHAIN=auto" >> "$GITHUB_ENV"

      # Pinned rather than "latest": golangci-lint v2 is a breaking config-format change
      # from v1 (see .golangci.yml's `version: "2"`), so an unpinned jump to a future v3
      # would silently break this the same way v1 -> v2 just did.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
